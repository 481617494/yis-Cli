# Build and publish Yis Cli binaries for macOS + Windows.
#
# Trigger:
#   git tag v0.1.0 && git push yis v0.1.0
#
# Assets:
#   yis-darwin-arm64
#   yis-darwin-x64   (cross-compiled on macos-14)
#   yis-windows-x64.exe
#   install.sh / install.ps1 / checksums.txt
#
# Note: do NOT use macos-13 — runners are often stuck "queued" forever,
# which blocks the release job and leaves the Releases page empty.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag name when manually running (e.g. v0.1.5). Leave empty to only build artifacts."
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-mac:
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin PROTOC
        shell: bash
        run: |
          set -euo pipefail
          PROTOC_PATH="$(command -v protoc)"
          echo "PROTOC=${PROTOC_PATH}" >> "$GITHUB_ENV"
          protoc --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-mac-v3
          cache-on-failure: true

      - name: Build macOS arm64 + x64
        shell: bash
        run: |
          set -euo pipefail
          export PROTOC="${PROTOC:?}"
          mkdir -p dist

          echo "==> arm64 (native)"
          cargo build -p xai-yis-pager-bin --release --target aarch64-apple-darwin
          strip target/aarch64-apple-darwin/release/yis || true
          cp target/aarch64-apple-darwin/release/yis dist/yis-darwin-arm64

          echo "==> x64 (cross from Apple Silicon runner)"
          cargo build -p xai-yis-pager-bin --release --target x86_64-apple-darwin
          strip target/x86_64-apple-darwin/release/yis || true
          cp target/x86_64-apple-darwin/release/yis dist/yis-darwin-x64

          ls -lh dist/

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-binaries
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin PROTOC
        shell: bash
        run: |
          set -euo pipefail
          PROTOC_PATH="$(command -v protoc)"
          if [[ -f "${PROTOC_PATH}.exe" ]]; then
            PROTOC_PATH="${PROTOC_PATH}.exe"
          fi
          if command -v cygpath >/dev/null 2>&1; then
            PROTOC_PATH="$(cygpath -w "$PROTOC_PATH")"
          fi
          echo "PROTOC=${PROTOC_PATH}" >> "$GITHUB_ENV"
          echo "Using PROTOC=${PROTOC_PATH}"
          protoc --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-win-v3
          cache-on-failure: true

      - name: Build Windows x64
        shell: bash
        run: |
          set -euo pipefail
          export PROTOC="${PROTOC:?}"
          protoc --version || true
          cargo build -p xai-yis-pager-bin --release --target x86_64-pc-windows-msvc
          mkdir -p dist
          cp target/x86_64-pc-windows-msvc/release/yis.exe dist/yis-windows-x64.exe
          ls -lh dist/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/yis-windows-x64.exe
          if-no-files-found: error
          retention-days: 14

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    # Always attempt publish if this was a tag push, even when one OS failed.
    if: |
      always()
      && !cancelled()
      && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != '')
    steps:
      - uses: actions/checkout@v4

      - name: Download mac artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: mac-binaries
          path: artifacts

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: windows-binary
          path: artifacts

      - name: Assemble release assets
        id: assemble
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          if [[ -d artifacts ]]; then
            find artifacts -type f -print0 | while IFS= read -r -d '' f; do
              cp -v "$f" "release/$(basename "$f")"
            done
          fi
          cp scripts/install-yis.sh release/install.sh
          cp scripts/install-yis.ps1 release/install.ps1
          chmod +x release/install.sh

          echo "=== release dir ==="
          ls -lah release/ || true

          BIN_COUNT=0
          shopt -s nullglob
          for f in release/yis-*; do
            BIN_COUNT=$((BIN_COUNT + 1))
          done
          echo "binary_count=${BIN_COUNT}" >> "$GITHUB_OUTPUT"
          if [[ "$BIN_COUNT" -eq 0 ]]; then
            echo "::error::No binaries found — all build jobs failed?"
            exit 1
          fi

          (
            cd release
            sha256sum * > checksums.txt || shasum -a 256 * > checksums.txt
          )
          ls -lh release/

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing tag: $(cat "$GITHUB_OUTPUT")"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Yis Cli ${{ steps.tag.outputs.name }}
          draft: false
          make_latest: true
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: release/*
          body: |
            ## Yis Cli ${{ steps.tag.outputs.name }}

            本地安全模式：不登录 grok.com，使用自备 API Key。

            ### 安装

            **macOS**
            ```bash
            curl -fsSL https://github.com/481617494/yis-Cli/releases/latest/download/install.sh | bash
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://github.com/481617494/yis-Cli/releases/latest/download/install.ps1 | iex
            ```

            ### 首次使用
            ```bash
            yis models setup
            yis
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
