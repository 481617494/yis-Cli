# Build and publish Yis Cli binaries for macOS + Windows.
#
# Trigger:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Assets uploaded to GitHub Release:
#   yis-darwin-arm64
#   yis-darwin-x64
#   yis-windows-x64.exe
#   install.sh
#   install.ps1
#   checksums.txt

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/upload (e.g. v0.1.0). Leave empty to only build artifacts without a release."
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: yis-darwin-arm64
            bin: yis
          - os: macos-13
            target: x86_64-apple-darwin
            asset: yis-darwin-x64
            bin: yis
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: yis-windows-x64.exe
            bin: yis.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # xai-yis-tools-api build.rs needs protoc. Repo bin/protoc is a dotslash
      # wrapper and CI does not ship dotslash — install a real protoc binary.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Pin absolute PROTOC so build scripts never pick up repo bin/protoc
      # (Unix dotslash script; invalid on Windows — os error 193).
      - name: Pin PROTOC for build scripts
        shell: bash
        run: |
          set -euo pipefail
          PROTOC_PATH="$(command -v protoc)"
          test -n "$PROTOC_PATH"
          # On Windows Git Bash, prefer a real .exe path if present
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            if [[ -f "${PROTOC_PATH}.exe" ]]; then
              PROTOC_PATH="${PROTOC_PATH}.exe"
            fi
            # Normalize to Windows path for native build scripts when possible
            if command -v cygpath >/dev/null 2>&1; then
              PROTOC_PATH="$(cygpath -w "$PROTOC_PATH")"
            fi
          fi
          echo "PROTOC=${PROTOC_PATH}" >> "$GITHUB_ENV"
          echo "Using PROTOC=${PROTOC_PATH}"
          protoc --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}-v2
          cache-on-failure: true

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          echo "Using PROTOC=${PROTOC:?PROTOC must be set}"
          # protoc --version may need the raw PATH name on some Windows setups
          protoc --version || "$PROTOC" --version
          cargo build -p xai-yis-pager-bin --release --target "${{ matrix.target }}"
          SRC="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          test -f "$SRC"
          # Strip on Unix to shrink size (Windows uses link-time strip / optional)
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            strip "$SRC" || true
          fi
          mkdir -p dist
          cp "$SRC" "dist/${{ matrix.asset }}"
          ls -lh "dist/${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 14

  # Publish even if some matrix builds failed (e.g. Windows red, Mac green).
  # Previously `needs: build` skipped this job entirely when any OS failed →
  # empty Releases page despite successful Mac artifacts.
  release:
    needs: build
    runs-on: ubuntu-latest
    if: |
      always()
      && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != '')
      && !cancelled()
    steps:
      - name: Checkout (for install scripts)
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts
          merge-multiple: true

      - name: Assemble release assets
        id: assemble
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          # Flatten whatever matrix jobs uploaded
          if [[ -d artifacts ]]; then
            find artifacts -type f -print0 | while IFS= read -r -d '' f; do
              cp "$f" "release/$(basename "$f")"
            done
          fi
          # Always ship installers (curl | bash works once any binary is present)
          cp scripts/install-yis.sh release/install.sh
          cp scripts/install-yis.ps1 release/install.ps1
          chmod +x release/install.sh || true

          BIN_COUNT=0
          for f in release/yis-*; do
            [[ -f "$f" ]] || continue
            BIN_COUNT=$((BIN_COUNT + 1))
          done
          echo "binary_count=${BIN_COUNT}" >> "$GITHUB_OUTPUT"
          if [[ "$BIN_COUNT" -eq 0 ]]; then
            echo "::error::No platform binaries were built; cannot create a useful Release"
            ls -la artifacts release || true
            exit 1
          fi

          (
            cd release
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 * > checksums.txt
            else
              sha256sum * > checksums.txt
            fi
          )
          echo "Release assets:"
          ls -lh release/

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Yis Cli ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, 'alpha') || contains(steps.tag.outputs.name, 'beta') || contains(steps.tag.outputs.name, 'rc') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: release/*
          body: |
            ## Yis Cli ${{ steps.tag.outputs.name }}

            本地安全模式 CLI：不连 grok.com 登录，使用自备 API Key。

            ### 安装

            **macOS**
            ```bash
            curl -fsSL https://github.com/481617494/yis-Cli/releases/latest/download/install.sh | bash
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://github.com/481617494/yis-Cli/releases/latest/download/install.ps1 | iex
            ```

            ### 首次使用
            ```bash
            yis models setup
            yis
            ```

            ### 资源（以实际 Assets 为准；部分平台失败时可能缺失）
            | 文件 | 平台 |
            |------|------|
            | `yis-darwin-arm64` | Apple Silicon |
            | `yis-darwin-x64` | Intel Mac |
            | `yis-windows-x64.exe` | Windows 64-bit |
            | `install.sh` / `install.ps1` | 安装脚本 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
